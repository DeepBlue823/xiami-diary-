<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小咪的日记本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "SimSun", serif;
            background: linear-gradient(135deg, #fff5f8 0%, #fce4ec 45%, #f3f8f0 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            color: #8b3a5a;
            text-shadow: 2px 2px 6px rgba(139, 58, 90, 0.15);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1.2em;
            color: #b05070;
            font-style: italic;
        }

        /* 日历样式 */
        .calendar {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(240, 100, 140, 0.15);
            border: 1px solid #fad4e0;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header button {
            background: linear-gradient(135deg, #f48fb1, #e07090);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(240, 100, 140, 0.3);
        }

        .calendar-header button:hover {
            background: linear-gradient(135deg, #e07090, #c85070);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(240, 100, 140, 0.4);
        }

        .calendar-header span {
            font-size: 1.3em;
            color: #8b3a5a;
            font-weight: bold;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }

        .calendar-weekdays span {
            color: #c07090;
            font-size: 0.9em;
            padding: 5px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
            font-size: 0.95em;
            color: #7a3050;
        }

        .calendar-day:hover {
            background: #fce4ec;
        }

        .calendar-day {
            position: relative;
        }

        .calendar-tooltip {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #8b3a5a;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75em;
            white-space: nowrap;
            z-index: 100;
            margin-bottom: 5px;
            box-shadow: 0 2px 10px rgba(139, 58, 90, 0.2);
        }

        .calendar-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #8b3a5a;
        }

        .calendar-day:hover .calendar-tooltip {
            display: block;
        }

        .calendar-day.other-month {
            color: #e0b0c0;
        }

        .calendar-day.today {
            background: #fce4ec;
            font-weight: bold;
            border: 2px solid #f48fb1;
        }

        .calendar-day.has-diary {
            font-weight: bold;
            background-color: var(--diary-color, #f06292);
            color: white;
        }

        .calendar-day.has-diary:hover {
            opacity: 0.85;
        }

        .calendar-day.is-meeting {
            background-color: #ce93d8;
            color: white;
            font-weight: bold;
        }

        .calendar-day.is-meeting:hover {
            opacity: 0.85;
        }

        .diary-marker {
            display: none;
        }

        /* 特殊日期标记 */
        .special-marker {
            position: absolute;
            bottom: 0;
            font-size: 1em;
        }

        .anniversary-marker {
            color: #FF69B4;
        }

        .birthday-marker {
            color: #FFD700;
        }

        /* 在一起的时间 */
        .together-time {
            font-size: 1em;
            color: #e0507a;
            margin-top: 5px;
            font-weight: bold;
        }

        /* 日记列表样式 */
        .diary-list {
            margin-top: 20px;
        }

        .diary-list h2 {
            color: #8b3a5a;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #f8c8d8;
            padding-bottom: 10px;
        }

        .diary-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(240, 100, 140, 0.1);
            border-left: 4px solid #f48fb1;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .diary-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(240, 100, 140, 0.2);
        }

        .diary-item .date {
            color: #c07090;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .diary-item .title {
            color: #7a2050;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .diary-item .preview {
            color: #9a5070;
            font-size: 0.95em;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .diary-item.expanded .preview {
            -webkit-line-clamp: unset;
            overflow: visible;
        }

        .diary-item .expand-hint {
            color: #c07090;
            font-size: 0.85em;
            text-align: right;
            margin-top: 8px;
            font-style: italic;
        }

        .diary-item .mood {
            font-size: 1.2em;
            margin-top: 10px;
        }

        /* 评论样式 */
        .diary-comments {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f8c8d8;
        }

        .comments-title {
            color: #c07090;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .comment-list {
            margin-bottom: 12px;
        }

        .comment-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: #fff8fb;
            border-radius: 6px;
        }

        .comment-item .emoji {
            font-size: 1.2em;
        }

        .comment-item .content {
            color: #8a4060;
            font-size: 0.9em;
            flex: 1;
        }

        .comment-item .time {
            color: #c0a0b0;
            font-size: 0.75em;
        }

        .comment-item .delete-btn {
            background: none;
            border: none;
            color: #e0c0cc;
            cursor: pointer;
            font-size: 0.9em;
            padding: 2px 5px;
            opacity: 0;
            transition: opacity 0.3s, color 0.3s;
        }

        .comment-item:hover .delete-btn {
            opacity: 1;
        }

        .comment-item .delete-btn:hover {
            color: #FF6347;
        }

        .comment-item .user-badge {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 5px;
        }

        .comment-item .user-badge.me {
            background: #FFD700;
            color: #7a3050;
        }

        .comment-item .user-badge.girlfriend {
            background: #FF69B4;
            color: white;
        }

        .user-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .user-selector button {
            padding: 4px 12px;
            border: 2px solid #f8c8d8;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .user-selector button.active {
            border-color: #FF69B4;
            background: #FF69B4;
            color: white;
        }

        .user-selector button.girlfriend.active {
            border-color: #FF69B4;
            background: #FF69B4;
        }

        .user-selector button.me.active {
            border-color: #FFD700;
            background: #FFD700;
            color: #7a3050;
        }

        .comment-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #f8c8d8;
            border-radius: 20px;
            font-size: 0.9em;
            outline: none;
            font-family: inherit;
        }

        .comment-input:focus {
            border-color: #f48fb1;
        }

        .emoji-picker {
            display: none;
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(240, 100, 140, 0.15);
            padding: 8px;
            gap: 5px;
            flex-wrap: wrap;
            width: 180px;
            z-index: 10;
        }

        .emoji-picker.show {
            display: flex;
        }

        .emoji-picker button {
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .emoji-picker button:hover {
            background: #fce4ec;
        }

        .emoji-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            padding: 4px;
        }

        .comment-submit {
            background: linear-gradient(135deg, #f48fb1, #e07090);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .comment-submit:hover {
            background: linear-gradient(135deg, #e07090, #c85070);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            color: #c07090;
            padding: 40px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #c07090;
            padding: 20px;
        }

        /* 小宠物样式 */
        .pets {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
            height: 120px;
        }

        .pet {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .pet:hover {
            transform: scale(1.1);
        }

        /* 小白猫 */
        .cat {
            animation: catBounce 2s ease-in-out infinite;
        }

        .cat-body {
            width: 50px;
            height: 60px;
            background: #fff;
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 2px 8px rgba(240, 100, 140, 0.15);
        }

        .cat-ear {
            position: absolute;
            top: -8px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 15px solid #fff;
        }

        .cat-ear.left { left: 5px; transform: rotate(-15deg); }
        .cat-ear.right { right: 5px; transform: rotate(15deg); }

        .cat-face {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 25px;
        }

        .cat-eye {
            position: absolute;
            width: 8px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            top: 0;
            animation: catBlink 4s infinite;
        }

        .cat-eye.left { left: 0; }
        .cat-eye.right { right: 0; }

        .cat-nose {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 4px;
            background: #FFB6C1;
            border-radius: 50%;
        }

        .cat-mouth {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border: 2px solid #333;
            border-top: none;
            border-left: none;
            border-radius: 0 0 50% 50%;
        }

        .cat-whiskers {
            position: absolute;
            top: 14px;
            width: 20px;
            height: 1px;
            background: #ddd;
        }

        .cat-whiskers.left { left: -10px; }
        .cat-whiskers.right { right: -10px; }

        /* 比格犬 */
        .dog {
            animation: dogBounce 2s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        .dog-body {
            width: 60px;
            height: 50px;
            background: #D2691E;
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 2px 8px rgba(240, 100, 140, 0.15);
        }

        .dog-ear {
            position: absolute;
            top: -5px;
            width: 20px;
            height: 35px;
            background: #8B4513;
            border-radius: 50% 50% 30% 30%;
            animation: dogEarFlop 2s ease-in-out infinite;
        }

        .dog-ear.left { left: -8px; }
        .dog-ear.right { right: -8px; }

        .dog-face {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 25px;
        }

        .dog-eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: 2px;
        }

        .dog-eye.left { left: 2px; }
        .dog-eye.right { right: 2px; }

        .dog-nose {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 10px;
            background: #222;
            border-radius: 50%;
        }

        .dog-tongue {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 15px;
            background: #FF6B6B;
            border-radius: 0 0 50% 50%;
            animation: dogPant 0.5s ease-in-out infinite;
        }

        /* 樱花花瓣飘落动画 */
        @keyframes petalFall {
            0% {
                transform: translateY(-30px) rotate(0deg) translateX(0px);
                opacity: 0.9;
            }
            20% { transform: translateY(20vh) rotate(72deg) translateX(25px); }
            40% { transform: translateY(40vh) rotate(144deg) translateX(-15px); }
            60% { transform: translateY(60vh) rotate(216deg) translateX(20px); }
            80% { transform: translateY(80vh) rotate(288deg) translateX(-10px); }
            100% {
                transform: translateY(108vh) rotate(360deg) translateX(0px);
                opacity: 0;
            }
        }

        .sakura-petal {
            position: fixed;
            top: 0;
            pointer-events: none;
            z-index: 0;
            animation: petalFall linear infinite;
            user-select: none;
            line-height: 1;
        }

        @keyframes catBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes catBlink {
            0%, 45%, 55%, 100% { height: 10px; }
            50% { height: 1px; }
        }

        @keyframes dogBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        @keyframes dogEarFlop {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes dogPant {
            0%, 100% { height: 15px; }
            50% { height: 18px; }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .calendar {
                padding: 15px;
            }

            .calendar-day {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>小咪的日记本</h1>
            <div class="date-display" id="currentDate"></div>
            <div class="together-time" id="togetherTime"></div>
        </header>

        <div class="pets">
            <div class="pet cat">
                <div class="cat-body">
                    <div class="cat-ear left"></div>
                    <div class="cat-ear right"></div>
                    <div class="cat-face">
                        <div class="cat-eye left"></div>
                        <div class="cat-eye right"></div>
                        <div class="cat-nose"></div>
                        <div class="cat-mouth"></div>
                        <div class="cat-whiskers left"></div>
                        <div class="cat-whiskers right"></div>
                    </div>
                </div>
            </div>
            <div class="pet dog">
                <div class="dog-body">
                    <div class="dog-ear left"></div>
                    <div class="dog-ear right"></div>
                    <div class="dog-face">
                        <div class="dog-eye left"></div>
                        <div class="dog-eye right"></div>
                        <div class="dog-nose"></div>
                        <div class="dog-tongue"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="diary-list">
            <h2>日记列表</h2>
            <div id="diaryListContent">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="calendar">
            <div class="calendar-header">
                <button onclick="prevMonth()">◀</button>
                <span id="currentMonth">2026年2月</span>
                <button onclick="nextMonth()">▶</button>
            </div>
            <div class="calendar-weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>
    </div>

    <script>
        const moodEmojis = {
            happy: '😊',
            love: '😍',
            peaceful: '😌',
            sad: '😢',
            angry: '😤',
            tired: '😴'
        };

        const moodColors = {
            happy: '#FFD700',
            love: '#FF69B4',
            peaceful: '#87CEEB',
            sad: '#9370DB',
            angry: '#FF6347',
            tired: '#A9A9A9'
        };

        const defaultMoodColor = '#f06292';

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let diaries = [];
        let meetings = [];
        let selectedEmoji = '';
        let currentUser = localStorage.getItem('commentUser') || 'girlfriend';

        const commentEmojis = ['💕', '👍', '❤️', '😍', '😂', '🎉', '😢', '👏'];

        // 创建樱花花瓣（SVG五瓣樱花）
        function createSakuraPetals() {
            const petalColors = [
                ['#ffb7c5', '#ff94a8'],
                ['#ffc8d5', '#ffaab8'],
                ['#ffd6e0', '#ffb7c5'],
                ['#f9a8c0', '#f07090'],
                ['#ffe0ec', '#ffb7c5'],
            ];
            for (let i = 0; i < 18; i++) {
                const petal = document.createElement('div');
                petal.className = 'sakura-petal';
                const size = Math.random() * 14 + 16;
                const colors = petalColors[Math.floor(Math.random() * petalColors.length)];
                petal.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(20,20)">
                        <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="${colors[0]}" transform="rotate(0)"/>
                        <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="${colors[0]}" transform="rotate(72)"/>
                        <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="${colors[0]}" transform="rotate(144)"/>
                        <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="${colors[0]}" transform="rotate(216)"/>
                        <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="${colors[0]}" transform="rotate(288)"/>
                        <circle cx="0" cy="0" r="4" fill="${colors[1]}"/>
                    </g>
                </svg>`;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 7 + 7) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                petal.style.opacity = (Math.random() * 0.35 + 0.5).toString();
                document.body.appendChild(petal);
            }
        }

        // 显示当前日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);

            // 计算在一起的时间
            const startDate = new Date('2025-08-29');
            const diffTime = now - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                const loveMessages = [
                    '相爱相伴的第 ${diffDays} 天 💕',
                    '我们在一起的第 ${diffDays} 天 💗',
                    '一起走过了 ${diffDays} 个日夜 🌸',
                    '相恋 ${diffDays} 天啦～ 🥰',
                    '第 ${diffDays} 天的甜蜜 💖'
                ];
                const msg = loveMessages[diffDays % loveMessages.length];
                document.getElementById('togetherTime').textContent = msg.replace('${diffDays}', diffDays);
            } else {
                document.getElementById('togetherTime').textContent = '💕 即将开启我们的故事';
            }
        }

        // 获取日记列表和见面日期
        async function fetchDiaries() {
            try {
                const [diariesRes, meetingsRes] = await Promise.all([
                    fetch('/api/diaries'),
                    fetch('/api/diaries?action=meetings')
                ]);
                diaries = await diariesRes.json();
                meetings = await meetingsRes.json();
                document.getElementById('diaryListContent').dataset.diaries = JSON.stringify(diaries);
                renderCalendar();
                renderDiaryList(diaries);
            } catch (error) {
                document.getElementById('diaryListContent').innerHTML =
                    '<div class="empty-state">加载失败，请稍后重试</div>';
            }
        }

        // 渲染日历
        function renderCalendar() {
            const year = currentYear;
            const month = currentMonth;

            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

            // 特殊日期
            const girlfriendBirthday = { month: 9, day: 1 }; // 10月1日
            const myBirthday = { month: 7, day: 23 }; // 8月23日
            const anniversary = { month: 7, day: 29 }; // 8月29日

            const container = document.getElementById('calendarDays');
            let html = '';

            // 上月日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // 当月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const diaryForDay = diaries.find(d => {
                    const diaryDate = new Date(d.date);
                    return diaryDate.getFullYear() === year &&
                           diaryDate.getMonth() === month &&
                           diaryDate.getDate() === day;
                });

                let classes = 'calendar-day';
                let style = '';
                let specialMarker = '';
                let tooltip = '';

                // 检查特殊日期
                if (month === girlfriendBirthday.month && day === girlfriendBirthday.day) {
                    const age = year - 2004;
                    specialMarker = '<span class="special-marker birthday-marker">🎂</span>';
                    tooltip = `小咪 ${age} 岁生日 🎂`;
                } else if (month === myBirthday.month && day === myBirthday.day) {
                    const age = year - 2004;
                    specialMarker = '<span class="special-marker birthday-marker">🎂</span>';
                    tooltip = `哥哥 ${age} 岁生日 🎂`;
                } else if (month === anniversary.month && day === anniversary.day) {
                    const years = year - 2025;
                    specialMarker = '<span class="special-marker anniversary-marker">💕</span>';
                    tooltip = `在一起 ${years + 1} 周年 💕`;
                }

                // 检查在一起的倍数天
                const startDate = new Date('2025-08-29');
                const currentDateFull = new Date(year, month, day);
                const diffDays = Math.floor((currentDateFull - startDate) / (1000 * 60 * 60 * 24));
                if (diffDays > 0 && diffDays % 100 === 0) {
                    tooltip = `在一起 ${diffDays} 天 💕`;
                }

                // 检查是否是见面日期
                let isMeetingDay = false;
                for (const meeting of meetings) {
                    const startStr = meeting.startDate.split('T')[0];
                    const endStr = meeting.endDate.split('T')[0];
                    const currentStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    if (currentStr >= startStr && currentStr <= endStr) {
                        isMeetingDay = true;
                        tooltip = tooltip ? tooltip + '<br>💜 见面日' : '💜 见面日';
                        break;
                    }
                }

                // 如果有日记，添加日记预览
                if (diaryForDay) {
                    const preview = diaryForDay.content ? diaryForDay.content.substring(0, 30) + '...' : '无内容';
                    tooltip = tooltip ? tooltip + '<br>' + preview : preview;
                }

                if (isCurrentMonth && today.getDate() === day) {
                    classes += ' today';
                }

                // 见面日显示猫狗图标
                let meetingIcon = '';
                if (isMeetingDay) {
                    // 同时显示猫狗
                    meetingIcon = '🐱🐕';
                } else if (diaryForDay) {
                    classes += ' has-diary';
                    const color = moodColors[diaryForDay.mood] || defaultMoodColor;
                    style = `style="--diary-color: ${color}"`;
                }

                html += `
                    <div class="${classes}" ${style} onclick="goToDiary('${dateStr}')">
                        ${day}
                        ${isMeetingDay ? meetingIcon : ''}
                        ${specialMarker}
                        ${tooltip ? `<div class="calendar-tooltip">${tooltip}</div>` : ''}
                    </div>
                `;
            }

            // 下月日期补齐
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }

            container.innerHTML = html;
        }

        // 上个月
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        // 下个月
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        // 跳转到有日记的日期
        function goToDiary(dateStr) {
            const diary = diaries.find(d => {
                const diaryDate = new Date(d.date);
                const targetDate = new Date(dateStr);
                return diaryDate.toDateString() === targetDate.toDateString();
            });

            if (diary) {
                // 滚动到日记列表
                document.querySelector('.diary-list').scrollIntoView({ behavior: 'smooth' });

                // 找到并展开对应的日记
                setTimeout(() => {
                    const diaryItems = document.querySelectorAll('.diary-item');
                    diaryItems.forEach(item => {
                        if (item.dataset.id == diary.id) {
                            if (!item.classList.contains('expanded')) {
                                item.click();
                            }
                            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                }, 300);
            }
        }

        // 渲染日记列表
        function renderDiaryList(diaryData) {
            const container = document.getElementById('diaryListContent');

            if (!diaryData || diaryData.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有日记呢～</div>';
                return;
            }

            // 按设置日期排序（最新的在前面）
            diaryData.sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = diaryData.map(diary => {
                const date = new Date(diary.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'short'
                });

                const locations = [];
                if (diary.girlfriendLocation) locations.push(`小咪: ${diary.girlfriendLocation}`);
                if (diary.myLocation) locations.push(`哥哥: ${diary.myLocation}`);
                const locationStr = locations.length > 0 ? locations.join(' | ') : '';

                return `
                    <div class="diary-item" data-id="${diary.id}" onclick="viewDiary('${diary.id}')">
                        <div class="date">${dateStr}</div>
                        ${locationStr ? `<div class="date" style="font-size: 0.8em;">📍 ${locationStr}</div>` : ''}
                        <div class="title">${diary.title}</div>
                        <div class="preview">${diary.content}</div>
                        ${diary.mood ? `<div class="mood">${moodEmojis[diary.mood]}</div>` : ''}
                        <div class="expand-hint">点击展开</div>
                        <div class="diary-comments" id="comments-${diary.id}" style="display: none;" onclick="event.stopPropagation()"></div>
                    </div>
                `;
            }).join('');
        }

        // 查看/展开日记详情
        async function viewDiary(id) {
            const diaryItems = document.querySelectorAll('.diary-item');
            let isExpanding = false;

            diaryItems.forEach(item => {
                if (item.dataset.id == id) {
                    const wasExpanded = item.classList.contains('expanded');
                    item.classList.toggle('expanded');

                    // 更新提示文字
                    let hint = item.querySelector('.expand-hint');
                    if (item.classList.contains('expanded')) {
                        if (!hint) {
                            hint = document.createElement('div');
                            hint.className = 'expand-hint';
                            item.appendChild(hint);
                        }
                        hint.textContent = '点击收起';
                        isExpanding = !wasExpanded;
                    } else if (hint) {
                        hint.textContent = '点击展开';
                    }
                }
            });

            // 加载评论
            const commentsContainer = document.getElementById(`comments-${id}`);
            if (isExpanding && commentsContainer) {
                commentsContainer.style.display = 'block';
                await loadComments(id, commentsContainer);
            } else if (commentsContainer) {
                commentsContainer.style.display = 'none';
            }
        }

        // 加载评论
        async function loadComments(diaryId, container) {
            try {
                const response = await fetch(`/api/diaries?action=comments&diaryId=${diaryId}`);
                const comments = await response.json();

                renderComments(diaryId, comments, container);
            } catch (error) {
                console.error('加载评论失败:', error);
            }
        }

        // 渲染评论
        function renderComments(diaryId, comments, container) {
            const getUserBadge = (user) => {
                if (user === 'me') {
                    return '<span class="user-badge me">哥哥</span>';
                } else if (user === 'girlfriend') {
                    return '<span class="user-badge girlfriend">小咪</span>';
                }
                return '';
            };

            const commentsHtml = comments.length > 0 ? `
                <div class="comments-title" onclick="event.stopPropagation()">评论 (${comments.length})</div>
                <div class="comment-list" onclick="event.stopPropagation()">
                    ${comments.map(c => `
                        <div class="comment-item">
                            ${getUserBadge(c.user)}
                            <span class="emoji">${c.emoji || '💬'}</span>
                            <span class="content">${c.content}</span>
                            <span class="time">${new Date(c.createdAt).toLocaleDateString('zh-CN')}</span>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteComment(${diaryId}, ${c.id})">🗑️</button>
                        </div>
                    `).join('')}
                </div>
            ` : '<div class="comments-title" onclick="event.stopPropagation()">还没有评论</div>';

            container.innerHTML = `
                ${commentsHtml}
                <div class="user-selector" onclick="event.stopPropagation()">
                    <button class="girlfriend ${currentUser === 'girlfriend' ? 'active' : ''}" onclick="selectUser('girlfriend')">小咪</button>
                    <button class="me ${currentUser === 'me' ? 'active' : ''}" onclick="selectUser('me')">哥哥</button>
                </div>
                <div class="comment-input-wrapper" style="position: relative;" onclick="event.stopPropagation()">
                    <input type="text" class="comment-input" id="input-${diaryId}"
                           placeholder="添加评论..." onkeypress="handleCommentKeypress(event, ${diaryId})">
                    <button class="emoji-btn" onclick="event.stopPropagation(); toggleEmojiPicker(${diaryId})">😊</button>
                    <div class="emoji-picker" id="emoji-picker-${diaryId}">
                        ${commentEmojis.map(e => `<button onclick="event.stopPropagation(); selectEmoji('${e}', ${diaryId})">${e}</button>`).join('')}
                    </div>
                    <button class="comment-submit" onclick="event.stopPropagation(); submitComment(${diaryId})">发送</button>
                </div>
            `;
        }

        // 选择评论用户
        function selectUser(user) {
            currentUser = user;
            localStorage.setItem('commentUser', user);

            // 更新按钮状态
            document.querySelectorAll('.user-selector button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.user-selector button.${user}`).classList.add('active');
        }

        // 删除评论
        async function deleteComment(diaryId, commentId) {
            if (!confirm('确定删除这条评论吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'deleteComment',
                        diaryId: diaryId,
                        commentId: commentId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 重新加载评论
                    const commentsContainer = document.getElementById(`comments-${diaryId}`);
                    await loadComments(diaryId, commentsContainer);
                }
            } catch (error) {
                console.error('删除评论失败:', error);
            }
        }

        // 切换表情选择器
        function toggleEmojiPicker(diaryId) {
            const picker = document.getElementById(`emoji-picker-${diaryId}`);
            picker.classList.toggle('show');
        }

        // 选择表情
        function selectEmoji(emoji, diaryId) {
            const input = document.getElementById(`input-${diaryId}`);
            input.value += emoji;
            selectedEmoji = emoji;

            const picker = document.getElementById(`emoji-picker-${diaryId}`);
            picker.classList.remove('show');
        }

        // 提交评论
        async function submitComment(diaryId) {
            const input = document.getElementById(`input-${diaryId}`);
            const content = input.value.trim();

            if (!content && !selectedEmoji) {
                return;
            }

            try {
                const response = await fetch('/api/diaries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addComment',
                        diaryId: diaryId,
                        content: content,
                        emoji: selectedEmoji || '💬',
                        user: currentUser
                    })
                });

                const result = await response.json();

                if (result.success) {
                    input.value = '';
                    selectedEmoji = '';

                    // 重新加载评论
                    const commentsContainer = document.getElementById(`comments-${diaryId}`);
                    await loadComments(diaryId, commentsContainer);
                }
            } catch (error) {
                console.error('提交评论失败:', error);
            }
        }

        // 键盘提交评论
        function handleCommentKeypress(event, diaryId) {
            if (event.key === 'Enter') {
                submitComment(diaryId);
            }
        }

        // 初始化
        createSakuraPetals();
        updateDate();
        fetchDiaries();
    </script>
</body>
</html>
