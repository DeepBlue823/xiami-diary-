<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小咪的日记本</title>
    <style>
        :root {
            --summer-ink: #2f5f6b;
            --summer-ink-soft: #4f8891;
            --summer-coral: #ff7f72;
            --summer-coral-deep: #e96558;
            --summer-sun: #ffd166;
            --summer-mint: #94d9bd;
            --summer-sky: #bfeeff;
            --summer-wave: #7bd5ee;
            --summer-sea: #8ee1d2;
            --summer-cream: #fff8d8;
            --summer-paper: #fbfff6;
            --summer-card: rgba(255, 255, 255, 0.78);
            --summer-line: #b8eadf;
            --summer-shadow: rgba(47, 95, 107, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "SimSun", serif;
            background:
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 22px),
                linear-gradient(180deg, #cef4ff 0%, #f7fdff 31%, var(--summer-cream) 58%, #d7f7e9 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(112deg, transparent 0 12%, rgba(255, 209, 102, 0.24) 12% 14%, transparent 14% 100%),
                linear-gradient(69deg, transparent 0 74%, rgba(123, 213, 238, 0.28) 74% 76%, transparent 76% 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 34%);
        }

        body::after {
            content: '';
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 36vh;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-linear-gradient(172deg, transparent 0 30px, rgba(255, 255, 255, 0.24) 30px 32px),
                linear-gradient(180deg, transparent 0%, rgba(123, 213, 238, 0.14) 30%, rgba(142, 225, 210, 0.22) 68%, rgba(255, 209, 102, 0.2) 100%);
            mask-image: linear-gradient(180deg, transparent 0%, #000 36%);
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 10px;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: min(420px, 72vw);
            height: 8px;
            margin: 16px auto 0;
            background:
                linear-gradient(90deg, transparent, rgba(255, 127, 114, 0.34), rgba(255, 209, 102, 0.42), rgba(148, 217, 189, 0.34), transparent);
            border-radius: 999px;
        }

        h1 {
            font-size: 2.5em;
            color: var(--summer-ink);
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.82), 0 10px 20px rgba(47, 95, 107, 0.11);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1.2em;
            color: var(--summer-ink-soft);
            font-style: italic;
        }

        /* 日历样式 */
        .calendar {
            background: var(--summer-card);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 0 18px 42px var(--summer-shadow);
            border: 1px solid var(--summer-line);
            backdrop-filter: blur(14px);
            position: relative;
            overflow: hidden;
        }

        .calendar::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(255, 209, 102, 0.15), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.62), transparent 38%);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .calendar-header button {
            background: linear-gradient(135deg, var(--summer-coral), var(--summer-sun));
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(255, 127, 114, 0.28);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-header button:hover {
            background: linear-gradient(135deg, var(--summer-coral-deep), #f6b44f);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 127, 114, 0.35);
        }

        .calendar-header span {
            font-size: 1.3em;
            color: var(--summer-ink);
            font-weight: bold;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .calendar-weekdays span {
            color: var(--summer-ink-soft);
            font-size: 0.9em;
            padding: 5px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            position: relative;
            z-index: 1;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
            position: relative;
            font-size: 0.95em;
            color: #356b72;
        }

        .calendar-day:hover {
            background: #fff3c4;
            box-shadow: inset 0 0 0 1px rgba(255, 127, 114, 0.24);
            transform: translateY(-1px);
        }

        .calendar-day {
            position: relative;
        }

        .calendar-tooltip {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #2f5f6b;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75em;
            white-space: nowrap;
            z-index: 100;
            margin-bottom: 5px;
            box-shadow: 0 2px 10px rgba(139, 58, 90, 0.2);
        }

        .calendar-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #2f5f6b;
        }

        .calendar-day:hover .calendar-tooltip {
            display: block;
        }

        .calendar-day.other-month {
            color: #e0b0c0;
        }

        .calendar-day.today {
            background: #fff3c4;
            font-weight: bold;
            border: 2px solid var(--summer-coral);
            box-shadow: 0 7px 14px rgba(255, 127, 114, 0.16);
        }

        .calendar-day.has-diary {
            font-weight: bold;
            background-color: var(--diary-color, #f06292);
            color: white;
        }

        .calendar-day.has-diary:hover {
            opacity: 0.85;
        }

        .calendar-day.is-meeting {
            background-color: #ce93d8;
            color: white;
            font-weight: bold;
        }

        .calendar-day.is-meeting:hover {
            opacity: 0.85;
        }

        .diary-marker {
            display: none;
        }

        /* 特殊日期标记 */
        .special-marker {
            position: absolute;
            bottom: 0;
            font-size: 1em;
        }

        .anniversary-marker {
            color: var(--summer-coral);
        }

        .birthday-marker {
            color: #FFD700;
        }

        /* 在一起的时间 */
        .together-time {
            font-size: 1em;
            color: var(--summer-coral-deep);
            margin-top: 5px;
            font-weight: bold;
        }

        /* 日记列表样式 */
        .diary-list {
            margin-top: 20px;
        }

        .diary-list h2 {
            color: var(--summer-ink);
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 0;
            padding-bottom: 16px;
            position: relative;
        }

        .diary-list h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            width: min(520px, 84vw);
            height: 3px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, var(--summer-line), var(--summer-sun), var(--summer-line), transparent);
            border-radius: 999px;
        }

        .diary-item {
            background: var(--summer-card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 14px 32px rgba(47, 95, 107, 0.1);
            border: 1px solid rgba(184, 234, 223, 0.78);
            border-left: 5px solid var(--summer-coral);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .diary-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(55, 151, 164, 0.18);
        }

        .diary-item .date {
            color: var(--summer-ink-soft);
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .diary-item .title {
            color: var(--summer-ink);
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .diary-item .preview {
            color: #4f7f83;
            font-size: 0.95em;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .diary-item.expanded .preview {
            -webkit-line-clamp: unset;
            overflow: visible;
        }

        .diary-item .expand-hint {
            color: var(--summer-ink-soft);
            font-size: 0.85em;
            text-align: right;
            margin-top: 8px;
            font-style: italic;
        }

        .diary-item .mood {
            font-size: 1.2em;
            margin-top: 10px;
        }

        /* 评论样式 */
        .diary-comments {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--summer-line);
        }

        .comments-title {
            color: var(--summer-ink-soft);
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .comment-list {
            margin-bottom: 12px;
        }

        .comment-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            padding: 9px 10px;
            background: rgba(243, 251, 248, 0.86);
            border: 1px solid rgba(184, 234, 223, 0.62);
            border-radius: 10px;
        }

        .comment-item .emoji {
            font-size: 1.2em;
        }

        .comment-item .content {
            color: #3f7378;
            font-size: 0.9em;
            flex: 1;
        }

        .comment-item .time {
            color: #c0a0b0;
            font-size: 0.75em;
        }

        .comment-item .delete-btn {
            background: none;
            border: none;
            color: #e0c0cc;
            cursor: pointer;
            font-size: 0.9em;
            padding: 2px 5px;
            opacity: 0;
            transition: opacity 0.3s, color 0.3s;
        }

        .comment-item:hover .delete-btn {
            opacity: 1;
        }

        .comment-item .delete-btn:hover {
            color: #FF6347;
        }

        .comment-item .user-badge {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 5px;
        }

        .comment-item .user-badge.me {
            background: #FFD700;
            color: #356b72;
        }

        .comment-item .user-badge.girlfriend {
            background: var(--summer-coral);
            color: white;
        }

        .user-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .user-selector button {
            padding: 4px 12px;
            border: 2px solid var(--summer-line);
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .user-selector button.active {
            border-color: var(--summer-coral);
            background: var(--summer-coral);
            color: white;
        }

        .user-selector button.girlfriend.active {
            border-color: var(--summer-coral);
            background: var(--summer-coral);
        }

        .user-selector button.me.active {
            border-color: #FFD700;
            background: #FFD700;
            color: #356b72;
        }

        .comment-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--summer-line);
            border-radius: 20px;
            font-size: 0.9em;
            outline: none;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.86);
        }

        .comment-input:focus {
            border-color: var(--summer-coral);
        }

        .emoji-picker {
            display: none;
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(55, 151, 164, 0.14);
            padding: 8px;
            gap: 5px;
            flex-wrap: wrap;
            width: 180px;
            z-index: 10;
        }

        .emoji-picker.show {
            display: flex;
        }

        .emoji-picker button {
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .emoji-picker button:hover {
            background: #fff3c4;
        }

        .emoji-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            padding: 4px;
        }

        .comment-submit {
            background: linear-gradient(135deg, var(--summer-coral), var(--summer-sun));
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .comment-submit:hover {
            background: linear-gradient(135deg, var(--summer-coral-deep), #f6b44f);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            color: var(--summer-ink-soft);
            padding: 40px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: var(--summer-ink-soft);
            padding: 20px;
        }

        /* 小宠物样式 */
        .pets {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            margin: 8px 0 32px;
            min-height: 150px;
        }

        .pet {
            position: relative;
            cursor: pointer;
            width: 142px;
            height: 142px;
            filter: drop-shadow(0 15px 16px rgba(47, 95, 107, 0.13));
            transition: transform 0.3s, filter 0.3s;
        }

        .pet:focus-visible {
            outline: 3px solid rgba(255, 127, 114, 0.45);
            outline-offset: 6px;
            border-radius: 24px;
        }

        .pet:hover {
            transform: translateY(-5px) scale(1.045);
            filter: drop-shadow(0 16px 18px rgba(255, 127, 114, 0.2));
        }

        .pet img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            transition: opacity 0.12s ease;
        }

        .pet.is-frame-active {
            filter: drop-shadow(0 18px 18px rgba(255, 127, 114, 0.24));
            z-index: 2;
        }

        .pet.is-frame-active img {
            opacity: 0.98;
        }

        .pet.is-page-running {
            visibility: hidden;
        }

        .pet-quote {
            position: fixed;
            left: 50%;
            top: 50%;
            width: min(280px, calc(100vw - 36px));
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(184, 234, 223, 0.9);
            box-shadow: 0 14px 32px rgba(47, 95, 107, 0.16);
            color: var(--summer-ink);
            font-size: 0.9em;
            line-height: 1.55;
            pointer-events: none;
            z-index: 1001;
            transform: translate(-50%, -112%) scale(0.96);
            opacity: 0;
            animation: quotePop 4.2s ease forwards;
            backdrop-filter: blur(12px);
        }

        .pet-quote .quote-name {
            display: block;
            color: var(--summer-coral-deep);
            font-weight: bold;
            margin-bottom: 3px;
        }

        .pet-quote::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -7px;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.94);
            border-right: 1px solid rgba(184, 234, 223, 0.9);
            border-bottom: 1px solid rgba(184, 234, 223, 0.9);
            transform: translateX(-50%) rotate(45deg);
        }

        .page-runner {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--runner-size, 142px);
            height: var(--runner-size, 142px);
            pointer-events: none;
            z-index: 999;
            filter: drop-shadow(0 18px 18px rgba(43, 172, 190, 0.24));
            will-change: transform;
        }

        .page-runner img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            user-select: none;
        }

        .cat {
            animation: catBounce 3.2s ease-in-out infinite;
        }

        .dog {
            animation: dogBounce 3.2s ease-in-out infinite;
            animation-delay: 0.35s;
        }

        @keyframes quotePop {
            0% {
                opacity: 0;
                transform: translate(-50%, -104%) scale(0.94);
            }
            12%, 82% {
                opacity: 1;
                transform: translate(-50%, -112%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -122%) scale(0.98);
            }
        }

        /* 夏日小物件飘落动画 */
        @keyframes summerDrift {
            0% {
                transform: translate3d(0, -36px, 0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: var(--drift-opacity, 0.72); }
            28% { transform: translate3d(var(--sway-a, 28px), 28vh, 0) rotate(86deg); }
            52% { transform: translate3d(var(--sway-b, -18px), 54vh, 0) rotate(174deg); }
            78% { transform: translate3d(var(--sway-c, 22px), 82vh, 0) rotate(268deg); }
            100% {
                transform: translate3d(0, 110vh, 0) rotate(360deg);
                opacity: 0;
            }
        }

        .summer-drift {
            position: fixed;
            top: 0;
            pointer-events: none;
            z-index: 0;
            animation: summerDrift linear infinite;
            animation-fill-mode: both;
            opacity: 0;
            user-select: none;
            line-height: 1;
            filter: drop-shadow(0 6px 7px rgba(47, 95, 107, 0.1));
        }

        @keyframes catBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes dogBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .calendar {
                padding: 15px;
            }

            .calendar-day {
                font-size: 0.85em;
            }

            .pets {
                gap: 12px;
                min-height: 124px;
            }

            .pet {
                width: 112px;
                height: 112px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .cat,
            .dog {
                animation: none;
            }

            .summer-drift {
                display: none;
            }

            .page-runner {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>小咪的日记本</h1>
            <div class="date-display" id="currentDate"></div>
            <div class="together-time" id="togetherTime"></div>
        </header>

        <div class="pets">
            <div class="pet cat" role="button" tabindex="0" aria-label="让小猫扭一扭">
                <img src="assets/pets/cat-sticker-v2.png" data-idle-src="assets/pets/cat-sticker-v2.png" data-frame-srcs="assets/pets/cat-wiggle-frame.png|assets/pets/cat-left-wiggle-frame.png" alt="灰白小猫贴纸">
            </div>
            <div class="pet dog" role="button" tabindex="0" aria-label="让小狗跑一圈">
                <img src="assets/pets/dog-sticker.png" data-idle-src="assets/pets/dog-sticker.png" data-frame-srcs="assets/pets/dog-run-frame.png" alt="棕白小狗贴纸">
            </div>
        </div>

        <div class="diary-list">
            <h2>日记列表</h2>
            <div id="diaryListContent">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="calendar">
            <div class="calendar-header">
                <button onclick="prevMonth()">◀</button>
                <span id="currentMonth">2026年2月</span>
                <button onclick="nextMonth()">▶</button>
            </div>
            <div class="calendar-weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>
    </div>

    <script>
        const moodEmojis = {
            happy: '😊',
            love: '😍',
            peaceful: '😌',
            sad: '😢',
            angry: '😤',
            tired: '😴'
        };

        const moodColors = {
            happy: '#FFD700',
            love: '#FF69B4',
            peaceful: '#87CEEB',
            sad: '#9370DB',
            angry: '#FF6347',
            tired: '#A9A9A9'
        };

        const defaultMoodColor = '#f06292';

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let diaries = [];
        let meetings = [];
        let selectedEmoji = '';
        let currentUser = localStorage.getItem('commentUser') || 'girlfriend';

        const commentEmojis = ['💕', '👍', '❤️', '😍', '😂', '🎉', '😢', '👏'];

        // 创建轻量夏日光影：小浪纹、星芒和薄荷叶。
        function createSummerDrifts() {
            const pieces = [

        // 渲染日历
        function renderCalendar() {
            const year = currentYear;
            const month = currentMonth;

            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

            // 特殊日期
            const girlfriendBirthday = { month: 9, day: 1 }; // 10月1日
            const myBirthday = { month: 7, day: 23 }; // 8月23日
            const anniversary = { month: 7, day: 29 }; // 8月29日

            const container = document.getElementById('calendarDays');
            let html = '';

            // 上月日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // 当月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const diaryForDay = diaries.find(d => {
                    const diaryDate = new Date(d.date);
                    return diaryDate.getFullYear() === year &&
                           diaryDate.getMonth() === month &&
                           diaryDate.getDate() === day;
                });

                let classes = 'calendar-day';
                let style = '';
                let specialMarker = '';
                let tooltip = '';

                // 检查特殊日期
                if (month === girlfriendBirthday.month && day === girlfriendBirthday.day) {
                    const age = year - 2004;
                    specialMarker = '<span class="special-marker birthday-marker">🎂</span>';
                    tooltip = `小咪 ${age} 岁生日 🎂`;
                } else if (month === myBirthday.month && day === myBirthday.day) {
                    const age = year - 2004;
                    specialMarker = '<span class="special-marker birthday-marker">🎂</span>';
                    tooltip = `哥哥 ${age} 岁生日 🎂`;
                } else if (month === anniversary.month && day === anniversary.day) {
                    const years = year - 2025;
                    specialMarker = '<span class="special-marker anniversary-marker">💕</span>';
                    tooltip = `在一起 ${years + 1} 周年 💕`;
                }

                // 检查在一起的倍数天
                const startDate = new Date('2025-08-29');
                const currentDateFull = new Date(year, month, day);
                const diffDays = Math.floor((currentDateFull - startDate) / (1000 * 60 * 60 * 24));
                if (diffDays > 0 && diffDays % 100 === 0) {
                    tooltip = `在一起 ${diffDays} 天 💕`;
                }

                // 检查是否是见面日期
                let isMeetingDay = false;
                for (const meeting of meetings) {
                    const startStr = meeting.startDate.split('T')[0];
                    const endStr = meeting.endDate.split('T')[0];
                    const currentStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    if (currentStr >= startStr && currentStr <= endStr) {
                        isMeetingDay = true;
                        tooltip = tooltip ? tooltip + '<br>💜 见面日' : '💜 见面日';
                        break;
                    }
                }

                // 如果有日记，添加日记预览
                if (diaryForDay) {
                    const preview = diaryForDay.content ? diaryForDay.content.substring(0, 30) + '...' : '无内容';
                    tooltip = tooltip ? tooltip + '<br>' + preview : preview;
                }

                if (isCurrentMonth && today.getDate() === day) {
                    classes += ' today';
                }

                // 见面日显示猫狗图标
                let meetingIcon = '';
                if (isMeetingDay) {
                    // 同时显示猫狗
                    meetingIcon = '🐱🐕';
                } else if (diaryForDay) {
                    classes += ' has-diary';
                    const color = moodColors[diaryForDay.mood] || defaultMoodColor;
                    style = `style="--diary-color: ${color}"`;
                }

                html += `
                    <div class="${classes}" ${style} onclick="goToDiary('${dateStr}')">
                        ${day}
                        ${isMeetingDay ? meetingIcon : ''}
                        ${specialMarker}
                        ${tooltip ? `<div class="calendar-tooltip">${tooltip}</div>` : ''}
                    </div>
                `;
            }

            // 下月日期补齐
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }

            container.innerHTML = html;
        }

        // 上个月
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        // 下个月
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        // 跳转到有日记的日期
        function goToDiary(dateStr) {
            const diary = diaries.find(d => {
                const diaryDate = new Date(d.date);
                const targetDate = new Date(dateStr);
                return diaryDate.toDateString() === targetDate.toDateString();
            });

            if (diary) {
                // 滚动到日记列表
                document.querySelector('.diary-list').scrollIntoView({ behavior: 'smooth' });

                // 找到并展开对应的日记
                setTimeout(() => {
                    const diaryItems = document.querySelectorAll('.diary-item');
                    diaryItems.forEach(item => {
                        if (item.dataset.id == diary.id) {
                            if (!item.classList.contains('expanded')) {
                                item.click();
                            }
                            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                }, 300);
            }
        }

        // 查看/展开日记详情
        async function viewDiary(id) {
            const diaryItems = document.querySelectorAll('.diary-item');
            let isExpanding = false;

            diaryItems.forEach(item => {
                if (item.dataset.id == id) {
                    const wasExpanded = item.classList.contains('expanded');
                    item.classList.toggle('expanded');

                    // 更新提示文字
                    let hint = item.querySelector('.expand-hint');
                    if (item.classList.contains('expanded')) {
                        if (!hint) {
                            hint = document.createElement('div');
                            hint.className = 'expand-hint';
                            item.appendChild(hint);
                        }
                        hint.textContent = '点击收起';
                        isExpanding = !wasExpanded;
                    } else if (hint) {
                        hint.textContent = '点击展开';
                    }
                }
            });

            // 加载评论
            const commentsContainer = document.getElementById(`comments-${id}`);
            if (isExpanding && commentsContainer) {
                commentsContainer.style.display = 'block';
                await loadComments(id, commentsContainer);
            } else if (commentsContainer) {
                commentsContainer.style.display = 'none';
            }
        }

        // 删除评论
        async function deleteComment(diaryId, commentId) {
            if (!confirm('确定删除这条评论吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'deleteComment',
                        diaryId: diaryId,
                        commentId: commentId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 重新加载评论
                    const commentsContainer = document.getElementById(`comments-${diaryId}`);
                    await loadComments(diaryId, commentsContainer);
                }
            } catch (error) {
                console.error('删除评论失败:', error);

            const input = document.getElementById(`input-${diaryId}`);

            const picker = document.getElementById(`emoji-picker-${diaryId}`);

        // 提交评论
        async function submitComment(diaryId) {
            const input = document.getElementById(`input-${diaryId}`);
            const content = input.value.trim();

            if (!content && !selectedEmoji) {
                return;
            }

            try {
                const response = await fetch('/api/diaries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addComment',
                        diaryId: diaryId,
                        content: content,
                        emoji: selectedEmoji || '💬',
                        user: currentUser
                    })
                });

                const result = await response.json();

                if (result.success) {
                    input.value = '';
                    selectedEmoji = '';

                    // 重新加载评论
                    const commentsContainer = document.getElementById(`comments-${diaryId}`);
                    await loadComments(diaryId, commentsContainer);
                }
            } catch (error) {
                console.error('提交评论失败:', error);
            }
        }

        function getDateKey(date) {
            const value = new Date(date);
            if (Number.isNaN(value.getTime())) return '';

            return [
                value.getFullYear(),
                String(value.getMonth() + 1).padStart(2, '0'),
                String(value.getDate()).padStart(2, '0')
            ].join('-');
        }

        function getDiaryContextPair() {
            const sorted = [...diaries]
                .filter((diary) => diary && diary.date)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            if (!sorted.length) return [];

            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);

            let current = sorted.find((diary) => getDateKey(diary.date) === getDateKey(today));
            let previous = sorted.find((diary) => getDateKey(diary.date) === getDateKey(yesterday));

            if (current && !previous) {
                previous = sorted.find((diary) => new Date(diary.date) < new Date(current.date));
            }

            if (!current) {
                current = sorted[0];
                previous = sorted.find((diary) => diary.id !== current.id);
            }

            return [current, previous].filter(Boolean);
        }

        function cleanDiaryText(text) {
            return String(text || '')
                .replace(/小比格|比格|哥哥|小狗/g, '小比格')
                .replace(/小咪宝宝|咪宝宝|咪宝|小猫咪|小猫|猫猫|咪咪|小咪(?!日记)|宝宝/g, '喵小咪')
                .replace(/[^\u3400-\u9fffA-Za-z0-9，。！？、；：\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function countKeywordHits(text, keywords) {
            return keywords.reduce((count, keyword) => (
                text.includes(keyword) ? count + 1 : count

                { name: 'sorry', words: ['对不起', '抱歉', '难过', '生气', '哭', '内疚', '伤心', '道歉'] },
                { name: 'game', words: ['游戏', '大乱斗', '海克斯', 'LOL', 'lolm', '麻将', '上分'] },
                { name: 'beauty', words: ['美', '化妆', '照片', '裙', '漂亮', '穿搭', '礼物'] }
            ];
            const themes = themeRules
                .map((theme) => ({ name: theme.name, score: countKeywordHits(text, theme.words) }))
                .filter((theme) => theme.score > 0)
                .sort((a, b) => b.score - a.score)
                .map((theme) => theme.name);

            return { themes };
        }

        function hasTheme(summary, theme) {
            return summary.themes.includes(theme);
        }

        function getPetVariantIndex(petType) {
            return petQuoteCounters[petType] % PET_QUOTE_VARIANT_COUNT;
        }

        function advancePetQuoteCounter(petType) {
            petQuoteCounters[petType] = (petQuoteCounters[petType] + 1) % PET_QUOTE_VARIANT_COUNT;
        }

        function normalizeLocalQuote(text, petType) {
            let quote = String(text || '').trim();
            const tail = petType === 'cat'
                ? '我今天也要被小比格认真宠着。'
                : '我今天也要把喵小咪稳稳放在心上。';

            if ([...quote].length < 30) {
                quote = `${quote}${tail}`;
            }

            return [...quote].slice(0, 50).join('');
        }

        function pickGeneratedLine(lines, variantIndex, petType) {
            return normalizeLocalQuote(lines[variantIndex % lines.length], petType);
        }

        function compactDiaryForQuote(diary) {
            return {
                id: diary.id,
                date: diary.date,
                title: diary.title || '',
                content: String(diary.content || '').slice(0, 1400),
                mood: diary.mood || '',
                girlfriendLocation: diary.girlfriendLocation || '',
                myLocation: diary.myLocation || ''
            };
        }

        function getPetQuoteCacheKey(petType, contextDiaries, variantIndex) {
            return [
                petType,
                variantIndex,
                ...contextDiaries.map((diary) => `${diary.id || ''}:${getDateKey(diary.date)}:${String(diary.content || '').length}`)
            ].join('|');
        }

        async function requestModelPetQuote(petType, contextDiaries, variantIndex) {
            const cacheKey = getPetQuoteCacheKey(petType, contextDiaries, variantIndex);
            if (petQuoteCache.has(cacheKey)) {
                return petQuoteCache.get(cacheKey);
            }

            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => controller.abort(), 8000);

            try {
                const response = await fetch('/api/pet-quote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        petType,
                        variantIndex,
                        diaries: contextDiaries.map(compactDiaryForQuote)
                    }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error('pet quote request failed');
                }

                const data = await response.json();
                const quote = String(data.quote || '').trim();
                if (!quote) {
                    throw new Error('empty pet quote');
                }

                petQuoteCache.set(cacheKey, quote);
                return quote;
            } finally {
                window.clearTimeout(timeoutId);
            }
        }

                return pickGeneratedLine(lines, variantIndex, petType);

            if (hasTheme(summary, 'growth') || hasTheme(summary, 'health')) {

            return pickGeneratedLine(lines, variantIndex, petType);

        async function showPetQuote(pet, options = {}) {
            const quote = document.createElement('div');
            const petType = options.petType === 'dog' ? 'dog' : 'cat';
            const variantIndex = getPetVariantIndex(petType);
            const name = petType === 'cat' ? '喵小咪' : '小比格';
            const contextDiaries = getDiaryContextPair();
            const fallbackQuote = buildPetQuote(petType, variantIndex);
            const rect = pet.getBoundingClientRect();
            const left = Math.min(Math.max(rect.left + rect.width / 2, 148), window.innerWidth - 148);
            const top = Math.max(rect.top - 8, 92);

            document.querySelectorAll('.pet-quote').forEach((node) => node.remove());
            quote.className = 'pet-quote';
            quote.style.left = `${left}px`;
            quote.style.top = `${top}px`;

            const nameNode = document.createElement('span');
            nameNode.className = 'quote-name';
            nameNode.textContent = `${name}：`;
            const quoteText = document.createTextNode(contextDiaries.length ? '正在读今天的小咪日记...' : fallbackQuote);
            quote.appendChild(nameNode);
            quote.appendChild(quoteText);
            document.body.appendChild(quote);
            advancePetQuoteCounter(petType);

            if (contextDiaries.length) {
                try {
                    quoteText.textContent = await requestModelPetQuote(petType, contextDiaries, variantIndex);
                } catch (error) {
                    quoteText.textContent = fallbackQuote;
                }
            }

            window.setTimeout(() => quote.remove(), PET_QUOTE_VISIBLE_MS);
        }

        function getPetSources(img) {
            const idleSrc = img.dataset.idleSrc || img.getAttribute('src');
            const frameSrcs = (img.dataset.frameSrcs || img.dataset.actionSrc || '')
                .split('|')
                .map((src) => src.trim())
                .filter(Boolean);

            return { idleSrc, frameSrcs };
        }

        function playPetFrames(pet, options = {}) {
            const img = pet.querySelector('img');
            if (!img) return;

            const { idleSrc, frameSrcs } = getPetSources(img);
            if (!frameSrcs.length) return;

            window.clearInterval(pet.petFrameInterval);
            window.clearTimeout(pet.petFrameTimer);

            const frameInterval = options.frameInterval || 180;
            const totalFrames = options.totalFrames || frameSrcs.length * 3;
            let frame = 0;

            const resetFrame = () => {
                window.clearInterval(pet.petFrameInterval);
                window.clearTimeout(pet.petFrameTimer);
                img.setAttribute('src', idleSrc);
                pet.classList.remove('is-frame-active');
            };

            const switchFrame = () => {
                img.setAttribute('src', frameSrcs[frame % frameSrcs.length]);
                frame += 1;

                if (frame >= totalFrames) {
                    resetFrame();
                }
            };

            pet.classList.add('is-frame-active');
            switchFrame();
            pet.petFrameInterval = window.setInterval(switchFrame, frameInterval);
            pet.petFrameTimer = window.setTimeout(resetFrame, frameInterval * totalFrames + 80);
        }

        function runPetAcrossPage(pet, options = {}) {
            const img = pet.querySelector('img');
            if (!img) return;

            const { idleSrc, frameSrcs } = getPetSources(img);
            if (!frameSrcs.length) return;

            if (pet.pageRunner) {
                window.cancelAnimationFrame(pet.pageRunner.petRunFrame);
                pet.pageRunner.remove();
                pet.pageRunner = null;
            }

            const rect = pet.getBoundingClientRect();
            const size = Math.round(Math.max(rect.width, rect.height));
            const duration = options.duration || 6500;
            const runner = document.createElement('div');
            const runnerImg = document.createElement('img');
            const runSrc = frameSrcs[0];
            const margin = 18;
            const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
            const maxX = Math.max(margin, window.innerWidth - size - margin);
            const maxY = Math.max(margin, window.innerHeight - size - margin);
            const start = {
                x: clamp(Math.round(rect.left), margin, maxX),
                y: clamp(Math.round(rect.top), margin, maxY)
            };
            const route = [
                start,
                { x: maxX, y: start.y },
                { x: maxX, y: maxY },
                { x: margin, y: maxY },
                { x: margin, y: margin },
                { x: start.x, y: start.y }
            ];
            const segments = route.slice(0, -1).map((point, index) => {
                const next = route[index + 1];
                const length = Math.hypot(next.x - point.x, next.y - point.y);

                return { from: point, to: next, length };
            });
            const totalDistance = segments.reduce((sum, segment) => sum + segment.length, 0);
            let lastDirection = 1;
            let startedAt = 0;

            runner.className = 'page-runner';
            runner.style.setProperty('--runner-size', `${size}px`);

            runnerImg.src = runSrc;
            runnerImg.alt = '';
            runner.appendChild(runnerImg);
            document.body.appendChild(runner);

            pet.pageRunner = runner;
            pet.classList.add('is-page-running');

            const clearRunner = () => {
                window.cancelAnimationFrame(runner.petRunFrame);
                runner.remove();
                pet.classList.remove('is-page-running');
                if (pet.pageRunner === runner) {
                    pet.pageRunner = null;
                }
            };

            const moveRunner = (timestamp) => {
                if (!startedAt) {
                    startedAt = timestamp;
                }

                const progress = Math.min((timestamp - startedAt) / duration, 1);
                let distance = totalDistance * progress;
                let currentSegment = segments[segments.length - 1];

                for (const segment of segments) {
                    if (distance <= segment.length) {
                        currentSegment = segment;
                        break;
                    }

                    distance -= segment.length;
                }

                const segmentProgress = currentSegment.length
                    ? distance / currentSegment.length
                    : 1;
                const x = currentSegment.from.x + (currentSegment.to.x - currentSegment.from.x) * segmentProgress;
                const y = currentSegment.from.y + (currentSegment.to.y - currentSegment.from.y) * segmentProgress;
                const dx = currentSegment.to.x - currentSegment.from.x;

                if (Math.abs(dx) > 1) {
                    lastDirection = dx > 0 ? 1 : -1;
                }

                runner.style.transform = `translate(${x}px, ${y}px) scaleX(${lastDirection})`;

                if (progress < 1) {
                    runner.petRunFrame = window.requestAnimationFrame(moveRunner);
                } else {
                    clearRunner();
                }
            };

            runner.style.transform = `translate(${start.x}px, ${start.y}px) scaleX(1)`;
            runner.petRunFrame = window.requestAnimationFrame(moveRunner);
        }

        function playPetAnimation(pet, options = {}) {
            showPetQuote(pet, options);

            if (options.pageRun) {
                runPetAcrossPage(pet, options);
                return;
            }

            playPetFrames(pet, options);
        }

        function bindPetAction(selector, options) {
            const pet = document.querySelector(selector);
            if (!pet) return;

            pet.addEventListener('click', () => playPetAnimation(pet, options));
            pet.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    playPetAnimation(pet, options);
                }
            });
        }

        function preloadPetFrames() {
            document.querySelectorAll('.pet img[data-frame-srcs], .pet img[data-action-src]').forEach((img) => {
                const { idleSrc, frameSrcs } = getPetSources(img);
                [idleSrc, ...frameSrcs].forEach((src) => {
                    const preload = new Image();
                    preload.src = src;
                });
            });
        }

        function initPetInteractions() {
            preloadPetFrames();
            bindPetAction('.pet.cat', { petType: 'cat', frameInterval: 320, totalFrames: 10 });
            bindPetAction('.pet.dog', { petType: 'dog', pageRun: true, duration: 6500 });
        }

        // 初始化
        createSummerDrifts();
        initPetInteractions();
        updateDate();
        fetchDiaries();
    </script>
