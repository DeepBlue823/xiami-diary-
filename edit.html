<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写日记 - 小咪的日记本</title>
    <style>
        :root {
            --summer-ink: #2f5f6b;
            --summer-ink-soft: #4f8891;
            --summer-coral: #ff7f72;
            --summer-coral-deep: #e96558;
            --summer-sun: #ffd166;
            --summer-mint: #94d9bd;
            --summer-sky: #bfeeff;
            --summer-wave: #7bd5ee;
            --summer-sea: #8ee1d2;
            --summer-cream: #fff8d8;
            --summer-paper: #fbfff6;
            --summer-card: rgba(255, 255, 255, 0.78);
            --summer-line: #b8eadf;
            --summer-shadow: rgba(47, 95, 107, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "SimSun", serif;
            background:
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 22px),
                linear-gradient(180deg, #cef4ff 0%, #f7fdff 31%, var(--summer-cream) 58%, #d7f7e9 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(112deg, transparent 0 12%, rgba(255, 209, 102, 0.24) 12% 14%, transparent 14% 100%),
                linear-gradient(69deg, transparent 0 74%, rgba(123, 213, 238, 0.28) 74% 76%, transparent 76% 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 34%);
        }

        body::after {
            content: '';
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 36vh;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-linear-gradient(172deg, transparent 0 30px, rgba(255, 255, 255, 0.24) 30px 32px),
                linear-gradient(180deg, transparent 0%, rgba(123, 213, 238, 0.14) 30%, rgba(142, 225, 210, 0.22) 68%, rgba(255, 209, 102, 0.2) 100%);
            mask-image: linear-gradient(180deg, transparent 0%, #000 36%);
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: min(420px, 72vw);
            height: 8px;
            margin: 16px auto 0;
            background:
                linear-gradient(90deg, transparent, rgba(255, 127, 114, 0.34), rgba(255, 209, 102, 0.42), rgba(148, 217, 189, 0.34), transparent);
            border-radius: 999px;
        }

        h1 {
            font-size: 2.5em;
            color: var(--summer-ink);
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.82), 0 10px 20px rgba(47, 95, 107, 0.11);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1.2em;
            color: var(--summer-ink-soft);
            font-style: italic;
        }

        .diary-card {
            background: var(--summer-card);
            border-radius: 18px;
            box-shadow: 0 18px 42px var(--summer-shadow);
            padding: 40px;
            position: relative;
            border: 1px solid var(--summer-line);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }

        .diary-card::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(255, 209, 102, 0.14), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.58), transparent 38%);
        }

        .diary-card > * {
            position: relative;
            z-index: 1;
        }


        .input-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            font-size: 1.1em;
            color: var(--summer-ink);
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--summer-line);
            border-radius: 10px;
            font-size: 1.1em;
            font-family: inherit;
            background: #fbfffb;
            color: var(--summer-ink);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--summer-coral);
            box-shadow: 0 0 10px rgba(255, 127, 114, 0.22);
        }

        textarea {
            min-height: 250px;
            resize: vertical;
            line-height: 1.8;
        }

        .mood-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mood-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid var(--summer-line);
            background: #fbfffb;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mood-btn:hover {
            transform: scale(1.1);
        }

        .mood-btn.selected {
            border-color: var(--summer-coral);
            background: #fff3c4;
            transform: scale(1.15);
        }

        .writer-btn {
            width: auto;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 1em;
        }

        .writer-btn.selected {
            background: var(--summer-coral);
            color: white;
            border-color: var(--summer-coral);
        }

        .edit-btn {
            background: none;
            border: none;
            color: var(--summer-ink-soft);
            cursor: pointer;
            font-size: 0.9em;
            padding: 5px 10px;
            margin-right: 5px;
            transition: color 0.3s;
        }

        .edit-btn:hover {
            color: var(--summer-ink);
        }

        .diary-item .meta-info {
            display: flex;
            gap: 10px;
            font-size: 0.8em;
            color: var(--summer-ink-soft);
            margin-top: 5px;
        }

        .diary-item .writer-badge {
            background: var(--summer-coral);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--summer-coral), var(--summer-sun));
            color: #fff;
            box-shadow: 0 8px 20px rgba(255, 127, 114, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 9px 22px rgba(255, 127, 114, 0.35);
            background: linear-gradient(135deg, var(--summer-coral-deep), #f6b44f);
        }

        .btn-secondary {
            background: #fff;
            color: var(--summer-ink);
            border: 2px solid var(--summer-line);
        }

        .btn-secondary:hover {
            background: #fff3c4;
            border-color: var(--summer-coral);
        }

        .diary-list {
            margin-top: 40px;
        }

        .diary-list h2 {
            color: var(--summer-ink);
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 0;
            padding-bottom: 16px;
            position: relative;
        }

        .diary-list h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            width: min(520px, 84vw);
            height: 3px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, var(--summer-line), var(--summer-sun), var(--summer-line), transparent);
            border-radius: 999px;
        }

        .diary-item {
            background: var(--summer-card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 14px 32px rgba(47, 95, 107, 0.1);
            border: 1px solid rgba(184, 234, 223, 0.78);
            border-left: 5px solid var(--summer-coral);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .diary-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(55, 151, 164, 0.18);
        }

        .diary-item .date {
            color: var(--summer-ink-soft);
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .diary-item .title {
            color: var(--summer-ink);
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .diary-item .preview {
            color: #4f7f83;
            font-size: 0.95em;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .diary-item.expanded .preview {
            -webkit-line-clamp: unset;
            overflow: visible;
        }

        .diary-item .expand-hint {
            color: var(--summer-ink-soft);
            font-size: 0.85em;
            text-align: right;
            margin-top: 8px;
            font-style: italic;
        }

        .diary-item .mood {
            font-size: 1.2em;
            margin-top: 10px;
        }

        .delete-btn {
            float: right;
            background: none;
            border: none;
            color: #e0b0c0;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
            transition: color 0.3s;
        }

        .delete-btn:hover {
            color: #d32f2f;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, var(--summer-coral), var(--summer-sun));
            color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 24px rgba(255, 127, 114, 0.28);
            transition: transform 0.5s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            text-align: center;
            color: var(--summer-ink-soft);
            padding: 40px;
            font-style: italic;
        }

        /* 登录弹窗 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(47, 95, 107, 0.68);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.97);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--summer-line);
            box-shadow: 0 18px 44px rgba(55, 151, 164, 0.22);
            backdrop-filter: blur(14px);
        }

        .login-box h2 {
            color: var(--summer-ink);
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--summer-line);
            border-radius: 10px;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .login-box .btn {
            width: 100%;
        }

        .login-error {
            color: #d32f2f;
            margin-bottom: 15px;
            display: none;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--summer-line);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            color: var(--summer-ink);
            transition: all 0.3s;
            z-index: 10;
        }

        .logout-btn:hover {
            background: #fff3c4;
            border-color: var(--summer-coral);
        }

        /* 夏日小物件飘落动画 */
        @keyframes summerDrift {
            0% {
                transform: translate3d(0, -36px, 0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: var(--drift-opacity, 0.72); }
            28% { transform: translate3d(var(--sway-a, 28px), 28vh, 0) rotate(86deg); }
            52% { transform: translate3d(var(--sway-b, -18px), 54vh, 0) rotate(174deg); }
            78% { transform: translate3d(var(--sway-c, 22px), 82vh, 0) rotate(268deg); }
            100% {
                transform: translate3d(0, 110vh, 0) rotate(360deg);
                opacity: 0;
            }
        }

        .summer-drift {
            position: fixed;
            top: 0;
            pointer-events: none;
            z-index: 0;
            animation: summerDrift linear infinite;
            animation-fill-mode: both;
            opacity: 0;
            user-select: none;
            line-height: 1;
            filter: drop-shadow(0 6px 7px rgba(47, 95, 107, 0.1));
        }

        @media (max-width: 600px) {
            .diary-card {
                padding: 25px;
            }


            h1 {
                font-size: 1.8em;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .summer-drift {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">退出登录</button>

    <div class="container">
        <header>
            <h1>写日记</h1>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="diary-card">
            <div class="input-group">
                <label for="diaryTitle">今日标题</label>
                <input type="text" id="diaryTitle" placeholder="给今天起个标题吧...">
            </div>

            <div class="input-group">
                <label for="diaryDate">日记日期</label>
                <input type="date" id="diaryDate">
            </div>

            <div class="input-group">
                <label>今日心情</label>
                <div class="mood-selector">
                    <button class="mood-btn" data-mood="happy" title="开心">😊</button>
                    <button class="mood-btn" data-mood="love" title="甜蜜">😍</button>
                    <button class="mood-btn" data-mood="peaceful" title="平静">😌</button>
                    <button class="mood-btn" data-mood="sad" title="难过">😢</button>
                    <button class="mood-btn" data-mood="angry" title="生气">😤</button>
                    <button class="mood-btn" data-mood="tired" title="疲惫">😴</button>
                </div>
            </div>

            <div class="input-group">
                <label for="girlfriendLocation">小咪所在地</label>
                <input type="text" id="girlfriendLocation" placeholder="小咪现在在哪里呢？">
            </div>

            <div class="input-group">
                <label for="myLocation">我的所在地</label>
                <input type="text" id="myLocation" placeholder="我现在在哪里呢？">
            </div>

            <div class="input-group">
                <label for="diaryContent">今日记录</label>
                <textarea id="diaryContent" placeholder="今天发生了什么有趣的事情呢？"></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveDiary()">保存日记</button>
                <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            </div>
        </div>

        <!-- 见面日期管理 -->
        <div class="diary-card" style="margin-top: 30px;">
            <h2 style="color: var(--summer-ink); font-size: 1.3em; margin-bottom: 20px; text-align: center;">见面日期管理</h2>

            <div class="input-group">
                <label>添加见面日期</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="newMeetingStart" style="flex: 1;">
                    <span>至</span>
                    <input type="date" id="newMeetingEnd" style="flex: 1;">
                    <button class="btn btn-primary" onclick="addMeeting()">添加</button>
                </div>
            </div>

            <div id="meetingsList"></div>
        </div>

        <div class="diary-list">
            <h2>所有日记</h2>
            <div id="diaryListContent"></div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>请输入密码</h2>
            <div class="login-error" id="loginError">密码错误，请重试</div>
            <input type="password" id="password" placeholder="请输入管理密码" onkeypress="handleEnter(event)">
            <button class="btn btn-primary" onclick="login()">登录</button>
        </div>
    </div>

    <div class="toast" id="toast">保存成功啦～</div>

    <script>
        const API_BASE = '';
        let authToken = localStorage.getItem('xiami_token');

        // 检查登录状态
        async function checkAuth() {
            if (!authToken) {
                document.getElementById('loginOverlay').style.display = 'flex';
                return false;
            }
            return true;
        }

        // 登录
        async function login() {
            const password = document.getElementById('password').value;
            if (!password) return;

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('xiami_token', data.token);
                    authToken = data.token;
                    document.getElementById('loginOverlay').style.display = 'none';
                    fetchDiaries();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('xiami_token');
            location.reload();
        }

        // 回车登录
        function handleEnter(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        // 显示当前日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 心情选择
        let selectedMood = null;

        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedMood = this.dataset.mood;
            });
        });

        // 保存/更新日记
        let editingId = null;

        async function saveDiary() {
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const dateInput = document.getElementById('diaryDate').value;
            const girlfriendLocation = document.getElementById('girlfriendLocation').value.trim();
            const myLocation = document.getElementById('myLocation').value.trim();

            if (!title && !content) {
                showToast('请写点什么吧～');
                return;
            }

            try {
                const body = {
                    title: title || '无标题',
                    content: content,
                    mood: selectedMood,
                    date: dateInput || null,
                    girlfriendLocation: girlfriendLocation || null,
                    myLocation: myLocation || null
                };

                let response;
                if (editingId) {
                    // 更新现有日记
                    body.id = editingId;
                    response = await fetch('/api/diaries', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify(body)
                    });
                } else {
                    // 新建日记
                    response = await fetch('/api/diaries', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify(body)
                    });
                }

                const data = await response.json();

                if (data.success) {
                    showToast('保存成功啦～');
                    clearForm();
                    fetchDiaries();
                } else {
                    showToast(data.error || '保存失败');
                }
            } catch (error) {
                showToast('保存失败，请重试');
            }
        }

        // 编辑日记
        function editDiary(id) {
            const diaries = JSON.parse(document.getElementById('diaryListContent').dataset.diaries || '[]');
            const diary = diaries.find(d => d.id == id);
            if (!diary) return;

            // 填充表单
            document.getElementById('diaryTitle').value = diary.title || '';
            document.getElementById('diaryContent').value = diary.content || '';
            document.getElementById('diaryDate').value = diary.date ? diary.date.split('T')[0] : '';
            document.getElementById('girlfriendLocation').value = diary.girlfriendLocation || '';
            document.getElementById('myLocation').value = diary.myLocation || '';

            // 设置心情
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            if (diary.mood) {
                const moodBtn = document.querySelector(`.mood-btn[data-mood="${diary.mood}"]`);
                if (moodBtn) {
                    moodBtn.classList.add('selected');
                    selectedMood = diary.mood;
                }
            } else {
                selectedMood = null;
            }

            editingId = id;

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 更改按钮文字
            document.querySelector('.btn-primary').textContent = '更新日记';
        }

        // 清空表单
        function clearForm() {
            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryDate').value = '';
            document.getElementById('diaryContent').value = '';
            document.getElementById('girlfriendLocation').value = '';
            document.getElementById('myLocation').value = '';
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            selectedMood = null;
            editingId = null;
            document.querySelector('.btn-primary').textContent = '保存日记';
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 获取日记列表
        async function fetchDiaries() {
            try {
                const response = await fetch('/api/diaries');
                const diaries = await response.json();
                document.getElementById('diaryListContent').dataset.diaries = JSON.stringify(diaries);
                renderDiaryList(diaries);
            } catch (error) {
                document.getElementById('diaryListContent').innerHTML =
                    '<div class="empty-state">加载失败，请稍后重试</div>';
            }
        }

        // 渲染日记列表
        function renderDiaryList(diaries) {
            const container = document.getElementById('diaryListContent');

            if (!diaries || diaries.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有日记呢，开始写第一篇吧～</div>';
                return;
            }

            // 按日期排序
            diaries.sort((a, b) => new Date(b.date) - new Date(a.date));

            const moodEmojis = {
                happy: '😊',
                love: '😍',
                peaceful: '😌',
                sad: '😢',
                angry: '😤',
                tired: '😴'
            };

            container.innerHTML = diaries.map(diary => {
                const date = new Date(diary.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'short'
                });

                return `
                    <div class="diary-item" data-id="${diary.id}">
                        ${diaryCardFlowers()}
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <button class="edit-btn" onclick="event.stopPropagation(); editDiary(${diary.id})">编辑</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteDiary(${diary.id})">×</button>
                        </div>
                        <div class="date">${dateStr}</div>
                        <div class="title">${diary.title}</div>
                        <div class="preview">${diary.content}</div>
                        ${diary.mood ? `<div class="mood">${moodEmojis[diary.mood]}</div>` : ''}
                        <div class="meta-info">
                            ${diary.girlfriendLocation ? `<span>📍 小咪: ${diary.girlfriendLocation}</span>` : ''}
                            ${diary.myLocation ? `<span>📍 哥哥: ${diary.myLocation}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 查看/展开日记详情
        function viewDiary(id) {
            const diaries = JSON.parse(document.getElementById('diaryListContent').dataset.diaries || '[]');
            const diary = diaries.find(d => d.id == id);
            if (!diary) return;

            // 找到对应的日记项元素并切换展开状态
            const diaryItems = document.querySelectorAll('.diary-item');
            diaryItems.forEach(item => {
                if (item.dataset.id == id) {
                    item.classList.toggle('expanded');
                    // 更新提示文字
                    let hint = item.querySelector('.expand-hint');
                    if (item.classList.contains('expanded')) {
                        if (!hint) {
                            hint = document.createElement('div');
                            hint.className = 'expand-hint';
                            item.appendChild(hint);
                        }
                        hint.textContent = '点击收起';
                    } else if (hint) {
                        hint.remove();
                    }
                }
            });
        }

        // 删除日记
        async function deleteDiary(id) {
            if (!confirm('确定要删除这篇日记吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ id })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('已删除');
                    fetchDiaries();
                } else {
                    showToast(data.error || '删除失败');
                }
            } catch (error) {
                showToast('删除失败，请重试');
            }
        }

        // 获取见面日期列表
        async function fetchMeetings() {
            try {
                const response = await fetch('/api/diaries?action=meetings');
                const meetings = await response.json();
                renderMeetings(meetings);
            } catch (error) {
                console.error('加载见面日期失败:', error);
            }
        }

        // 渲染见面日期列表
        function renderMeetings(meetings) {
            const container = document.getElementById('meetingsList');

            if (!meetings || meetings.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有见面日期记录</div>';
                return;
            }

            container.innerHTML = meetings.map(meeting => {
                const start = new Date(meeting.startDate);
                const end = new Date(meeting.endDate);
                const startStr = start.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
                const endStr = end.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

                return `
                    <div class="diary-item" style="cursor: default;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span>🤍 ${startStr} - ${endStr}</span>
                            <button class="delete-btn" onclick="deleteMeeting(${meeting.id})">×</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 添加见面日期
        async function addMeeting() {
            const startDate = document.getElementById('newMeetingStart').value;
            const endDate = document.getElementById('newMeetingEnd').value;

            if (!startDate || !endDate) {
                showToast('请选择开始和结束日期');
                return;
            }

            try {
                const response = await fetch('/api/diaries', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        action: 'addMeeting',
                        startDate,
                        endDate
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('添加成功');
                    document.getElementById('newMeetingStart').value = '';
                    document.getElementById('newMeetingEnd').value = '';
                    fetchMeetings();
                } else {
                    showToast(data.error || '添加失败');
                }
            } catch (error) {
                showToast('添加失败，请重试');
            }
        }

        // 删除见面日期
        async function deleteMeeting(id) {
            if (!confirm('确定删除这个见面日期吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        action: 'deleteMeeting',
                        id
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('已删除');
                    fetchMeetings();
                } else {
                    showToast(data.error || '删除失败');
                }
            } catch (error) {
                showToast('删除失败，请重试');
            }
        }

        // 创建轻量夏日光影：小浪纹、星芒和薄荷叶。
        function createSummerDrifts() {
            const pieces = [
                (size) => `<svg width="${size * 1.8}" height="${size}" viewBox="0 0 64 34" xmlns="http://www.w3.org/2000/svg"><path d="M5 19c8-9 15-9 23 0s15 9 23 0" fill="none" stroke="#7bd5ee" stroke-width="3" stroke-linecap="round" opacity="0.72"/><path d="M13 25c6-5 12-5 18 0s12 5 18 0" fill="none" stroke="#94d9bd" stroke-width="2" stroke-linecap="round" opacity="0.58"/></svg>`,
                (size) => `<svg width="${size}" height="${size}" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g stroke="#ffd166" stroke-width="2.4" stroke-linecap="round"><line x1="22" y1="7" x2="22" y2="16"/><line x1="22" y1="28" x2="22" y2="37"/><line x1="7" y1="22" x2="16" y2="22"/><line x1="28" y1="22" x2="37" y2="22"/><line x1="12" y1="12" x2="17" y2="17"/><line x1="27" y1="27" x2="32" y2="32"/><line x1="32" y1="12" x2="27" y2="17"/><line x1="17" y1="27" x2="12" y2="32"/></g><circle cx="22" cy="22" r="4.5" fill="#ffe59b"/></svg>`,
                (size) => `<svg width="${size}" height="${size * 1.25}" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg"><path d="M8 39C9 23 20 10 34 6c-2 17-12 30-26 33Z" fill="#94d9bd" opacity="0.72"/><path d="M10 37c8-8 14-18 22-29" fill="none" stroke="#4f8891" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/></svg>`,
                (size) => `<svg width="${size}" height="${size}" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><circle cx="22" cy="22" r="7" fill="#fff8d8" opacity="0.88"/><circle cx="22" cy="22" r="13" fill="none" stroke="#bfeeff" stroke-width="2" opacity="0.58"/></svg>`
            ];

            for (let i = 0; i < 26; i++) {
                const drift = document.createElement('div');
                drift.className = 'summer-drift';
                const size = Math.random() * 10 + 16;
                const piece = pieces[Math.floor(Math.random() * pieces.length)];
                drift.innerHTML = piece(size);
                drift.style.left = Math.random() * 100 + 'vw';
                drift.style.animationDuration = (Math.random() * 8 + 10) + 's';
                drift.style.animationDelay = (Math.random() * 12) + 's';
                drift.style.setProperty('--drift-opacity', (Math.random() * 0.26 + 0.48).toString());
                drift.style.setProperty('--sway-a', (Math.random() * 42 - 8) + 'px');
                drift.style.setProperty('--sway-b', (Math.random() * -34 - 8) + 'px');
                drift.style.setProperty('--sway-c', (Math.random() * 38 - 10) + 'px');
                document.body.appendChild(drift);
            }
        }

        // 日记卡片夏日角落装饰
        function diaryCardFlowers() {
            const wave = '<svg width="52" height="22" viewBox="0 0 72 30" xmlns="http://www.w3.org/2000/svg"><path d="M4 17c9-8 17-8 26 0s17 8 26 0" fill="none" stroke="#7bd5ee" stroke-width="3" stroke-linecap="round" opacity="0.72"/><path d="M14 23c7-5 13-5 20 0s13 5 20 0" fill="none" stroke="#94d9bd" stroke-width="2" stroke-linecap="round" opacity="0.56"/></svg>';
            const glint = '<svg width="18" height="18" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g stroke="#ffd166" stroke-width="3" stroke-linecap="round"><line x1="22" y1="6" x2="22" y2="16"/><line x1="22" y1="28" x2="22" y2="38"/><line x1="6" y1="22" x2="16" y2="22"/><line x1="28" y1="22" x2="38" y2="22"/></g><circle cx="22" cy="22" r="4" fill="#ffe59b"/></svg>';
            const leaf = (rot) => `<svg width="15" height="22" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg"><path d="M4 28C5 15 11 7 18 3c-2 9-6 18-14 25Z" fill="#8ee1d2" opacity="0.82" transform="rotate(${rot},10,16)"/></svg>`;
            return `
                <div style="position:absolute;top:-12px;right:12px;display:flex;align-items:center;gap:3px;pointer-events:none;">
                    ${leaf(-8)}${wave}${glint}
                </div>
                <div style="position:absolute;bottom:-12px;left:10px;display:flex;align-items:center;gap:3px;pointer-events:none;">
                    ${glint}${wave}${leaf(10)}
                </div>`;
        }

        // 初始化
        createSummerDrifts();
        updateDate();
        checkAuth().then(isLoggedIn => {
            if (isLoggedIn) {
                fetchDiaries();
                fetchMeetings();
            }
        });
    </script>
</body>
</html>
