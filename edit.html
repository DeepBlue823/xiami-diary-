<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写日记 - 小咪的日记本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "SimSun", serif;
            background: linear-gradient(135deg, #fff5f8 0%, #fce4ec 45%, #f3f8f0 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            color: #8b3a5a;
            text-shadow: 2px 2px 6px rgba(139, 58, 90, 0.15);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1.2em;
            color: #b05070;
            font-style: italic;
        }

        .diary-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(240, 100, 140, 0.15);
            padding: 40px;
            position: relative;
            border: 1px solid #fad4e0;
        }


        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1.1em;
            color: #8b3a5a;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f8c8d8;
            border-radius: 10px;
            font-size: 1.1em;
            font-family: inherit;
            background: #fffafb;
            color: #7a2050;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #f48fb1;
            box-shadow: 0 0 10px rgba(244, 143, 177, 0.25);
        }

        textarea {
            min-height: 250px;
            resize: vertical;
            line-height: 1.8;
        }

        .mood-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mood-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #f8c8d8;
            background: #fffafb;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mood-btn:hover {
            transform: scale(1.1);
        }

        .mood-btn.selected {
            border-color: #f48fb1;
            background: #fce4ec;
            transform: scale(1.15);
        }

        .writer-btn {
            width: auto;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 1em;
        }

        .writer-btn.selected {
            background: #FF69B4;
            color: white;
            border-color: #FF69B4;
        }

        .edit-btn {
            background: none;
            border: none;
            color: #c07090;
            cursor: pointer;
            font-size: 0.9em;
            padding: 5px 10px;
            margin-right: 5px;
            transition: color 0.3s;
        }

        .edit-btn:hover {
            color: #8b3a5a;
        }

        .diary-item .meta-info {
            display: flex;
            gap: 10px;
            font-size: 0.8em;
            color: #c07090;
            margin-top: 5px;
        }

        .diary-item .writer-badge {
            background: #FF69B4;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f48fb1, #e07090);
            color: #fff;
            box-shadow: 0 4px 15px rgba(240, 100, 140, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 100, 140, 0.4);
            background: linear-gradient(135deg, #e07090, #c85070);
        }

        .btn-secondary {
            background: #fff;
            color: #8b3a5a;
            border: 2px solid #f8c8d8;
        }

        .btn-secondary:hover {
            background: #fce4ec;
            border-color: #f48fb1;
        }

        .diary-list {
            margin-top: 40px;
        }

        .diary-list h2 {
            color: #8b3a5a;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #f8c8d8;
            padding-bottom: 10px;
        }

        .diary-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(240, 100, 140, 0.1);
            border-left: 4px solid #f48fb1;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .diary-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(240, 100, 140, 0.2);
        }

        .diary-item .date {
            color: #c07090;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .diary-item .title {
            color: #7a2050;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .diary-item .preview {
            color: #9a5070;
            font-size: 0.95em;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .diary-item.expanded .preview {
            -webkit-line-clamp: unset;
            overflow: visible;
        }

        .diary-item .expand-hint {
            color: #c07090;
            font-size: 0.85em;
            text-align: right;
            margin-top: 8px;
            font-style: italic;
        }

        .diary-item .mood {
            font-size: 1.2em;
            margin-top: 10px;
        }

        .delete-btn {
            float: right;
            background: none;
            border: none;
            color: #e0b0c0;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
            transition: color 0.3s;
        }

        .delete-btn:hover {
            color: #d32f2f;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #f48fb1, #e07090);
            color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(240, 100, 140, 0.35);
            transition: transform 0.5s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            text-align: center;
            color: #c07090;
            padding: 40px;
            font-style: italic;
        }

        /* 登录弹窗 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(139, 58, 90, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.97);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #fad4e0;
            box-shadow: 0 8px 30px rgba(240, 100, 140, 0.2);
        }

        .login-box h2 {
            color: #8b3a5a;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f8c8d8;
            border-radius: 10px;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .login-box .btn {
            width: 100%;
        }

        .login-error {
            color: #d32f2f;
            margin-bottom: 15px;
            display: none;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #f8c8d8;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            color: #8b3a5a;
            transition: all 0.3s;
            z-index: 10;
        }

        .logout-btn:hover {
            background: #fce4ec;
            border-color: #f48fb1;
        }

        /* 樱花花瓣飘落动画 */
        @keyframes petalFall {
            0% {
                transform: translateY(-30px) rotate(0deg) translateX(0px);
                opacity: 0.9;
            }
            20% { transform: translateY(20vh) rotate(72deg) translateX(25px); }
            40% { transform: translateY(40vh) rotate(144deg) translateX(-15px); }
            60% { transform: translateY(60vh) rotate(216deg) translateX(20px); }
            80% { transform: translateY(80vh) rotate(288deg) translateX(-10px); }
            100% {
                transform: translateY(108vh) rotate(360deg) translateX(0px);
                opacity: 0;
            }
        }

        .sakura-petal {
            position: fixed;
            top: 0;
            pointer-events: none;
            z-index: 0;
            animation: petalFall linear infinite;
        }

        .sakura-petal::before {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
        }

        @media (max-width: 600px) {
            .diary-card {
                padding: 25px;
            }


            h1 {
                font-size: 1.8em;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">退出登录</button>

    <div class="container">
        <header>
            <h1>写日记</h1>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="diary-card">
            <div class="input-group">
                <label for="diaryTitle">今日标题</label>
                <input type="text" id="diaryTitle" placeholder="给今天起个标题吧...">
            </div>

            <div class="input-group">
                <label for="diaryDate">日记日期</label>
                <input type="date" id="diaryDate">
            </div>

            <div class="input-group">
                <label>今日心情</label>
                <div class="mood-selector">
                    <button class="mood-btn" data-mood="happy" title="开心">😊</button>
                    <button class="mood-btn" data-mood="love" title="甜蜜">😍</button>
                    <button class="mood-btn" data-mood="peaceful" title="平静">😌</button>
                    <button class="mood-btn" data-mood="sad" title="难过">😢</button>
                    <button class="mood-btn" data-mood="angry" title="生气">😤</button>
                    <button class="mood-btn" data-mood="tired" title="疲惫">😴</button>
                </div>
            </div>

            <div class="input-group">
                <label for="girlfriendLocation">小咪所在地</label>
                <input type="text" id="girlfriendLocation" placeholder="小咪现在在哪里呢？">
            </div>

            <div class="input-group">
                <label for="myLocation">我的所在地</label>
                <input type="text" id="myLocation" placeholder="我现在在哪里呢？">
            </div>

            <div class="input-group">
                <label for="diaryContent">今日记录</label>
                <textarea id="diaryContent" placeholder="今天发生了什么有趣的事情呢？"></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveDiary()">保存日记</button>
                <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            </div>
        </div>

        <!-- 见面日期管理 -->
        <div class="diary-card" style="margin-top: 30px;">
            <h2 style="color: #8b3a5a; font-size: 1.3em; margin-bottom: 20px; text-align: center;">见面日期管理</h2>

            <div class="input-group">
                <label>添加见面日期</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="newMeetingStart" style="flex: 1;">
                    <span>至</span>
                    <input type="date" id="newMeetingEnd" style="flex: 1;">
                    <button class="btn btn-primary" onclick="addMeeting()">添加</button>
                </div>
            </div>

            <div id="meetingsList"></div>
        </div>

        <div class="diary-list">
            <h2>所有日记</h2>
            <div id="diaryListContent"></div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>请输入密码</h2>
            <div class="login-error" id="loginError">密码错误，请重试</div>
            <input type="password" id="password" placeholder="请输入管理密码" onkeypress="handleEnter(event)">
            <button class="btn btn-primary" onclick="login()">登录</button>
        </div>
    </div>

    <div class="toast" id="toast">保存成功啦～</div>

    <script>
        const API_BASE = '';
        let authToken = localStorage.getItem('xiami_token');

        // 检查登录状态
        async function checkAuth() {
            if (!authToken) {
                document.getElementById('loginOverlay').style.display = 'flex';
                return false;
            }
            return true;
        }

        // 登录
        async function login() {
            const password = document.getElementById('password').value;
            if (!password) return;

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('xiami_token', data.token);
                    authToken = data.token;
                    document.getElementById('loginOverlay').style.display = 'none';
                    fetchDiaries();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('xiami_token');
            location.reload();
        }

        // 回车登录
        function handleEnter(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        // 显示当前日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 心情选择
        let selectedMood = null;

        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedMood = this.dataset.mood;
            });
        });

        // 保存/更新日记
        let editingId = null;

        async function saveDiary() {
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const dateInput = document.getElementById('diaryDate').value;
            const girlfriendLocation = document.getElementById('girlfriendLocation').value.trim();
            const myLocation = document.getElementById('myLocation').value.trim();

            if (!title && !content) {
                showToast('请写点什么吧～');
                return;
            }

            try {
                const body = {
                    title: title || '无标题',
                    content: content,
                    mood: selectedMood,
                    date: dateInput || null,
                    girlfriendLocation: girlfriendLocation || null,
                    myLocation: myLocation || null
                };

                let response;
                if (editingId) {
                    // 更新现有日记
                    body.id = editingId;
                    response = await fetch('/api/diaries', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify(body)
                    });
                } else {
                    // 新建日记
                    response = await fetch('/api/diaries', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify(body)
                    });
                }

                const data = await response.json();

                if (data.success) {
                    showToast('保存成功啦～');
                    clearForm();
                    fetchDiaries();
                } else {
                    showToast(data.error || '保存失败');
                }
            } catch (error) {
                showToast('保存失败，请重试');
            }
        }

        // 编辑日记
        function editDiary(id) {
            const diaries = JSON.parse(document.getElementById('diaryListContent').dataset.diaries || '[]');
            const diary = diaries.find(d => d.id == id);
            if (!diary) return;

            // 填充表单
            document.getElementById('diaryTitle').value = diary.title || '';
            document.getElementById('diaryContent').value = diary.content || '';
            document.getElementById('diaryDate').value = diary.date ? diary.date.split('T')[0] : '';
            document.getElementById('girlfriendLocation').value = diary.girlfriendLocation || '';
            document.getElementById('myLocation').value = diary.myLocation || '';

            // 设置心情
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            if (diary.mood) {
                const moodBtn = document.querySelector(`.mood-btn[data-mood="${diary.mood}"]`);
                if (moodBtn) {
                    moodBtn.classList.add('selected');
                    selectedMood = diary.mood;
                }
            } else {
                selectedMood = null;
            }

            editingId = id;

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 更改按钮文字
            document.querySelector('.btn-primary').textContent = '更新日记';
        }

        // 清空表单
        function clearForm() {
            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryDate').value = '';
            document.getElementById('diaryContent').value = '';
            document.getElementById('girlfriendLocation').value = '';
            document.getElementById('myLocation').value = '';
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            selectedMood = null;
            editingId = null;
            document.querySelector('.btn-primary').textContent = '保存日记';
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 获取日记列表
        async function fetchDiaries() {
            try {
                const response = await fetch('/api/diaries');
                const diaries = await response.json();
                document.getElementById('diaryListContent').dataset.diaries = JSON.stringify(diaries);
                renderDiaryList(diaries);
            } catch (error) {
                document.getElementById('diaryListContent').innerHTML =
                    '<div class="empty-state">加载失败，请稍后重试</div>';
            }
        }

        // 渲染日记列表
        function renderDiaryList(diaries) {
            const container = document.getElementById('diaryListContent');

            if (!diaries || diaries.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有日记呢，开始写第一篇吧～</div>';
                return;
            }

            // 按日期排序
            diaries.sort((a, b) => new Date(b.date) - new Date(a.date));

            const moodEmojis = {
                happy: '😊',
                love: '😍',
                peaceful: '😌',
                sad: '😢',
                angry: '😤',
                tired: '😴'
            };

            container.innerHTML = diaries.map(diary => {
                const date = new Date(diary.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'short'
                });

                return `
                    <div class="diary-item" data-id="${diary.id}">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <button class="edit-btn" onclick="event.stopPropagation(); editDiary(${diary.id})">编辑</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteDiary(${diary.id})">×</button>
                        </div>
                        <div class="date">${dateStr}</div>
                        <div class="title">${diary.title}</div>
                        <div class="preview">${diary.content}</div>
                        ${diary.mood ? `<div class="mood">${moodEmojis[diary.mood]}</div>` : ''}
                        <div class="meta-info">
                            ${diary.girlfriendLocation ? `<span>📍 小咪: ${diary.girlfriendLocation}</span>` : ''}
                            ${diary.myLocation ? `<span>📍 哥哥: ${diary.myLocation}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 查看/展开日记详情
        function viewDiary(id) {
            const diaries = JSON.parse(document.getElementById('diaryListContent').dataset.diaries || '[]');
            const diary = diaries.find(d => d.id == id);
            if (!diary) return;

            // 找到对应的日记项元素并切换展开状态
            const diaryItems = document.querySelectorAll('.diary-item');
            diaryItems.forEach(item => {
                if (item.dataset.id == id) {
                    item.classList.toggle('expanded');
                    // 更新提示文字
                    let hint = item.querySelector('.expand-hint');
                    if (item.classList.contains('expanded')) {
                        if (!hint) {
                            hint = document.createElement('div');
                            hint.className = 'expand-hint';
                            item.appendChild(hint);
                        }
                        hint.textContent = '点击收起';
                    } else if (hint) {
                        hint.remove();
                    }
                }
            });
        }

        // 删除日记
        async function deleteDiary(id) {
            if (!confirm('确定要删除这篇日记吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ id })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('已删除');
                    fetchDiaries();
                } else {
                    showToast(data.error || '删除失败');
                }
            } catch (error) {
                showToast('删除失败，请重试');
            }
        }

        // 获取见面日期列表
        async function fetchMeetings() {
            try {
                const response = await fetch('/api/diaries?action=meetings');
                const meetings = await response.json();
                renderMeetings(meetings);
            } catch (error) {
                console.error('加载见面日期失败:', error);
            }
        }

        // 渲染见面日期列表
        function renderMeetings(meetings) {
            const container = document.getElementById('meetingsList');

            if (!meetings || meetings.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有见面日期记录</div>';
                return;
            }

            container.innerHTML = meetings.map(meeting => {
                const start = new Date(meeting.startDate);
                const end = new Date(meeting.endDate);
                const startStr = start.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
                const endStr = end.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

                return `
                    <div class="diary-item" style="cursor: default;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span>🤍 ${startStr} - ${endStr}</span>
                            <button class="delete-btn" onclick="deleteMeeting(${meeting.id})">×</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 添加见面日期
        async function addMeeting() {
            const startDate = document.getElementById('newMeetingStart').value;
            const endDate = document.getElementById('newMeetingEnd').value;

            if (!startDate || !endDate) {
                showToast('请选择开始和结束日期');
                return;
            }

            try {
                const response = await fetch('/api/diaries', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        action: 'addMeeting',
                        startDate,
                        endDate
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('添加成功');
                    document.getElementById('newMeetingStart').value = '';
                    document.getElementById('newMeetingEnd').value = '';
                    fetchMeetings();
                } else {
                    showToast(data.error || '添加失败');
                }
            } catch (error) {
                showToast('添加失败，请重试');
            }
        }

        // 删除见面日期
        async function deleteMeeting(id) {
            if (!confirm('确定删除这个见面日期吗？')) return;

            try {
                const response = await fetch('/api/diaries', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        action: 'deleteMeeting',
                        id
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('已删除');
                    fetchMeetings();
                } else {
                    showToast(data.error || '删除失败');
                }
            } catch (error) {
                showToast('删除失败，请重试');
            }
        }

        // 创建樱花花瓣
        function createSakuraPetals() {
            const colors = ['#ffb7c5', '#ffc0cb', '#ffcdd2', '#f8bbd0', '#fce4ec', '#f9a8c0', '#ffb3ba'];
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'sakura-petal';
                const size = Math.random() * 10 + 8;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.background = colors[Math.floor(Math.random() * colors.length)];
                petal.style.animationDuration = (Math.random() * 7 + 7) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                petal.style.opacity = (Math.random() * 0.4 + 0.4).toString();
                document.body.appendChild(petal);
            }
        }

        // 初始化
        createSakuraPetals();
        updateDate();
        checkAuth().then(isLoggedIn => {
            if (isLoggedIn) {
                fetchDiaries();
                fetchMeetings();
            }
        });
    </script>
</body>
</html>
